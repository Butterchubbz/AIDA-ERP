name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-lint:
    name: Install, Type-check, Lint, Test, Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint (fail on warnings)
        run: npm run lint -- --max-warnings=0

      - name: Run tests
        run: npm test -- --run

      - name: Build (production)
        run: npm run build

      - name: Upload dist artifact (optional)
        if: success() && always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
