name: Bundle analysis

on:
  pull_request:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build (ANALYZE=true)
        env:
          ANALYZE: 'true'
        run: npm run build --if-present

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      - name: Upload stats.html (if produced)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/stats.html
