name: PocketBase Backup

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  noop:
    name: Noop (main branch check)
    runs-on: ubuntu-latest
    steps:
      - name: Skip backup on push
        run: echo "PocketBase backup runs on manual dispatch only."

  backup:
    if: github.event_name == 'workflow_dispatch'
    name: Backup PocketBase DB and storage
    runs-on: [self-hosted, pocketbase]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run pb-backup script
        run: |
          node ./scripts/pb-backup.mjs --db ${{ env.PB_DB_PATH }} --storage ${{ env.PB_STORAGE_PATH }} --out ./pb_backups
        env:
          PB_DB_PATH: ${{ secrets.PB_DB_PATH }}
          PB_STORAGE_PATH: ${{ secrets.PB_STORAGE_PATH }}

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketbase-backups
          path: ./pb_backups
