name: PocketBase Backup to S3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  noop:
    name: Noop (main branch check)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Skip backup on push
        run: echo "PocketBase S3 backup runs on manual dispatch only."

  backup-to-s3:
    if: github.event_name == 'workflow_dispatch'
    name: Backup PocketBase and upload to S3
    runs-on: [self-hosted, pocketbase]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run pb-backup script
        env:
          PB_DB_PATH: ${{ secrets.PB_DB_PATH }}
          PB_STORAGE_PATH: ${{ secrets.PB_STORAGE_PATH }}
        run: |
          mkdir -p ./pb_backups
          node ./scripts/pb-backup.mjs --db ${{ secrets.PB_DB_PATH }} --storage ${{ secrets.PB_STORAGE_PATH }} --out ./pb_backups

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload backups to S3
        run: |
          for f in ./pb_backups/*; do
            echo "Uploading $f to s3://${{ secrets.PB_S3_BUCKET }}/${{ github.run_id }}/$(basename $f)";
            aws s3 cp "$f" "s3://${{ secrets.PB_S3_BUCKET }}/${{ github.run_id }}/$(basename $f)" --acl private;
          done

      - name: S3 retention cleanup (delete old backups)
        env:
          PB_S3_BUCKET: ${{ secrets.PB_S3_BUCKET }}
          RETENTION_DAYS: ${{ secrets.PB_S3_RETENTION_DAYS || '30' }}
        run: |
          echo "Cleaning up S3 backups older than $RETENTION_DAYS days in bucket $PB_S3_BUCKET"
          PREFIX=""
          # List all objects in the bucket (may paginate); we only consider objects at top-level
          aws s3api list-objects-v2 --bucket "$PB_S3_BUCKET" --query 'Contents[].[Key,LastModified]' --output json > /tmp/s3_objects.json || true

          node -e "
const fs = require('fs');
const objs = JSON.parse(fs.readFileSync('/tmp/s3_objects.json','utf8')||'[]');
const days = Number(process.env.RETENTION_DAYS || 30);
const cutoff = Date.now() - days*24*60*60*1000;
const toDelete = objs.filter(o=>{ try{ const lm = new Date(o[1]).getTime(); return lm < cutoff;}catch(e){return false}}).map(o=>({Key:o[0]}));
if(toDelete.length===0){ console.log('No objects to delete'); process.exit(0); }
const payload = {Objects: toDelete};
fs.writeFileSync('/tmp/delete_payload.json', JSON.stringify(payload));
console.log('Deleting', toDelete.length, 'objects');
";

          if [ -f /tmp/delete_payload.json ]; then
            aws s3api delete-objects --bucket "$PB_S3_BUCKET" --delete file:///tmp/delete_payload.json || true
          fi
