name: Sentry Release (source maps)

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Build and upload source maps to Sentry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload source maps to Sentry (conditional)
        if: ${{ secrets.SENTRY_AUTH_TOKEN && secrets.SENTRY_ORG && secrets.SENTRY_PROJECT && secrets.VITE_SENTRY_DSN }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          npm install -g @sentry/cli
          export RELEASE=$(git rev-parse --short HEAD)
          sentry-cli releases -o $SENTRY_ORG -p $SENTRY_PROJECT new $RELEASE
          sentry-cli releases -o $SENTRY_ORG -p $SENTRY_PROJECT files $RELEASE upload-sourcemaps ./dist --rewrite --url-prefix '~/assets'
          sentry-cli releases -o $SENTRY_ORG -p $SENTRY_PROJECT finalize $RELEASE
